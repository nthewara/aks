---
# Egress permits for the frontend side (default-deny means frontend can't egress otherwise)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: np-2-frontend-egress-api
  namespace: dev-frontend
spec:
  endpointSelector:
    matchLabels:
      app: frontend
  egress:
    - toEndpoints:
        - matchLabels:
            app: api
            io.kubernetes.pod.namespace: dev-api
      toPorts:
        - ports:
            - { port: "80", protocol: TCP }
---
apiVersion: "cilium.io/v2"
