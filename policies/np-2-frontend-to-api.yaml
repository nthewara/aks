# NP-2: Allow frontend → api on TCP/80, scoped to the SAME environment.
# Three CNPs (one per env) — Cilium endpointSelector matches the api pod by label,
# fromEndpoints matches the frontend pod that's also in the same env namespace.
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: np-2-frontend-to-api
  namespace: dev-api
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
            io.kubernetes.pod.namespace: dev-frontend
      toPorts:
        - ports:
            - { port: "80", protocol: TCP }
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: np-2-frontend-to-api
  namespace: test-api
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
            io.kubernetes.pod.namespace: test-frontend
      toPorts:
        - ports:
            - { port: "80", protocol: TCP }
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: np-2-frontend-to-api
  namespace: prod-api
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
            io.kubernetes.pod.namespace: prod-frontend
      toPorts:
        - ports:
