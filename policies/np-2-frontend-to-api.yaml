# NP-2 — Allow frontend → api on TCP/80 within the SAME environment.
# Two halves per env:
#   • egress on the frontend pods → api in same env
#   • ingress on the api pods   ← frontend in same env
# Three envs × 2 halves = 6 CiliumNetworkPolicies.
---
# === dev ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: np-2-frontend-egress, namespace: dev-frontend }
spec:
  description: "dev-frontend → dev-api TCP/80"
  endpointSelector:
    matchLabels: { app: frontend, environment: dev }
  egress:
    - toEndpoints:
        - matchLabels:
            app: api
            environment: dev
            k8s:io.kubernetes.pod.namespace: dev-api
      toPorts:
        - ports: [{ port: "80", protocol: TCP }]
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: np-2-api-ingress, namespace: dev-api }
spec:
  description: "dev-api ← dev-frontend TCP/80"
  endpointSelector:
    matchLabels: { app: api, environment: dev }
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontend
            environment: dev
            k8s:io.kubernetes.pod.namespace: dev-frontend
      toPorts:
        - ports: [{ port: "80", protocol: TCP }]
---
