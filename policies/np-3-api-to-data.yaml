# NP-3: Allow api → data on TCP/6379, scoped to the SAME environment.
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata: { name: np-3-api-to-data, namespace: dev-data }
spec:
  endpointSelector: { matchLabels: { app: data } }
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: api
            io.kubernetes.pod.namespace: dev-api
      toPorts:
        - ports: [ { port: "6379", protocol: TCP } ]
---
