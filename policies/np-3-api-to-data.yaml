# NP-3 — Allow api → data on TCP/6379 within the SAME environment.
# Same shape as NP-2: egress half on api side, ingress half on data side.
---
# === dev ===
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: np-3-api-egress, namespace: dev-api }
spec:
  description: "dev-api → dev-data TCP/6379"
  endpointSelector:
    matchLabels: { app: api, environment: dev }
  egress:
    - toEndpoints:
        - matchLabels:
            app: data
            environment: dev
            k8s:io.kubernetes.pod.namespace: dev-data
      toPorts:
        - ports: [{ port: "6379", protocol: TCP }]
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata: { name: np-3-data-ingress, namespace: dev-data }
spec:
  description: "dev-data ← dev-api TCP/6379"
  endpointSelector:
    matchLabels: { app: data, environment: dev }
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: api
            environment: dev
            k8s:io.kubernetes.pod.namespace: dev-api
      toPorts:
        - ports: [{ port: "6379", protocol: TCP }]
