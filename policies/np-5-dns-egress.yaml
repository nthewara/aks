# NP-5: Allow DNS egress to kube-dns (UDP/53 + TCP/53) from every lab pod.
# CiliumClusterwideNetworkPolicy so we don't repeat per-ns.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: np-5-dns-egress
spec:
  endpointSelector:
    matchExpressions:
      - { key: io.kubernetes.pod.namespace, operator: In,
          values: [ dev-frontend, dev-api, dev-data,
                    test-frontend, test-api, test-data,
                    prod-frontend, prod-api, prod-data ] }
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - { port: "53", protocol: UDP }
            - { port: "53", protocol: TCP }
