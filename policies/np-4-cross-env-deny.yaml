# NP-4: Cross-environment deny — block ONLY dev<->prod traffic, leave same-env alone.
# We use two separate deny policies, each scoped to one side.
---
# Block prod-* pods from receiving traffic from dev-* pods.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: np-4-deny-dev-to-prod
spec:
  endpointSelector:
    matchExpressions:
      - { key: io.kubernetes.pod.namespace, operator: In,
          values: [ prod-frontend, prod-api, prod-data ] }
  ingressDeny:
    - fromEndpoints:
        - matchExpressions:
            - { key: io.kubernetes.pod.namespace, operator: In,
                values: [ dev-frontend, dev-api, dev-data ] }
---
# Block dev-* pods from receiving traffic from prod-* pods.
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: np-4-deny-prod-to-dev
spec:
  endpointSelector:
    matchExpressions:
      - { key: io.kubernetes.pod.namespace, operator: In,
          values: [ dev-frontend, dev-api, dev-data ] }
  ingressDeny:
    - fromEndpoints:
        - matchExpressions:
            - { key: io.kubernetes.pod.namespace, operator: In,
                values: [ prod-frontend, prod-api, prod-data ] }
