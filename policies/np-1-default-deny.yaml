# NP-1: Default-deny ingress + egress in every lab namespace.
# Using standard NetworkPolicy (Cilium honours it). One manifest per ns.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: dev-frontend }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: dev-api }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: dev-data }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: test-frontend }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: test-api }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: test-data }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: prod-frontend }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: prod-api }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: prod-data }
spec: { podSelector: {}, policyTypes: [ Ingress, Egress ] }
