# NP-1 — Default deny ingress + egress in every lab namespace.
#
# Cilium's `enableDefaultDeny` (introduced in 1.14) is the cleanest way to
# turn a namespace/endpoint into deny-by-default without having to ship a
# rule that "selects but allows nothing". Allow-policies (NP-2..NP-5) then
# poke the holes we want.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: np-1-default-deny
spec:
  description: "NP-1 default-deny ingress+egress for purpose=lab namespaces"
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace.labels.purpose: lab
  enableDefaultDeny:
    ingress: true
    egress: true
