# Frontend = nginx. Deployed into <env>-frontend.
# Pod labels mirror the namespace labels so CiliumNetworkPolicy can
# combine namespaceSelector + endpointSelector for fine-grained rules.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: __ENV__-frontend
  labels: { app: frontend, environment: __ENV__, purpose: lab }
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend, environment: __ENV__ }
  template:
    metadata:
      labels: { app: frontend, environment: __ENV__, purpose: lab }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "10m", memory: "16Mi" }
            limits:   { cpu: "100m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: __ENV__-frontend
  labels: { app: frontend, environment: __ENV__, purpose: lab }
spec:
  selector: { app: frontend, environment: __ENV__ }
  ports:
    - name: http
      port: 80
      targetPort: 80
