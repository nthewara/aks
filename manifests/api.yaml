# API = httpbin. Deployed into <env>-api.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: __ENV__-api
  labels: { app: api, environment: __ENV__, purpose: lab }
spec:
  replicas: 1
  selector:
    matchLabels: { app: api, environment: __ENV__ }
  template:
    metadata:
      labels: { app: api, environment: __ENV__, purpose: lab }
    spec:
      containers:
        - name: httpbin
          image: kennethreitz/httpbin:latest
          ports: [{ containerPort: 80 }]
          resources:
            requests: { cpu: "20m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /status/200, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: __ENV__-api
  labels: { app: api, environment: __ENV__, purpose: lab }
spec:
  selector: { app: api, environment: __ENV__ }
  ports:
    - name: http
      port: 80
      targetPort: 80
